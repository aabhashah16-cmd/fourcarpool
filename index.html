<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOUR Carpool</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: #190484;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: #efefef;
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 42px;
      margin: 0;
      color: #190484;
      letter-spacing: 1px;
    }

   p {
  color: #000000;
  margin-top: 10px;
  margin-bottom: 35px;
  font-size: 18px;
  font-weight: 600;
}

    a {
      display: block;
      text-decoration: none;
      padding: 14px;
      margin: 14px 0;
      border-radius: 14px;
      font-weight: 600;
      background: #190484;
      color: #efefef;
      border: none;
      transition: 0.2s ease;
    }

    a:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="logo.png" alt="FOUR Logo">

  <h1>FOUR Carpool</h1>

  <p>Book Carpool in seconds. Choose your platform below!</p>

  <a href="https://www.fourcarpool.com/" target="_blank">
    Visit Website
  </a>

  <a href="https://apps.apple.com/in/app/four-carpool/id6759831653" target="_blank">
    Download on App Store
  </a>

  <a href="https://play.google.com/store/apps/details?id=com.four.car.fourcar" target="_blank">
    Download on Play Store
  </a>

</div>

</body>
</html>
