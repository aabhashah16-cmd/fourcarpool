<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FOUR Carpool</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
      background: linear-gradient(135deg, #190484, #0b0126);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .card {
      width: 90%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px 30px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    img {
      width: 80px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 42px;
      margin: 0;
      letter-spacing: 1px;
    }

    p {
      color: #cbd5e1;
      margin-top: 10px;
      margin-bottom: 35px;
      font-size: 14px;
    }

    a {
      display: block;
      text-decoration: none;
      padding: 14px;
      margin: 14px 0;
      border-radius: 14px;
      font-weight: 600;
      transition: 0.2s ease;
    }

    .web {
      background: white;
      color: black;
    }

    .ios {
      background: #1d4ed8;
      color: white;
    }

    .android {
      background: #16a34a;
      color: white;
    }

    a:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    .tag {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="card">

  <!-- LOGO -->
  <img src="logo.png" alt="FOUR Logo">

  <h1>FOUR Carpool</h1>
  <p>Smarter carpooling for everyday travel 🚗</p>

  <a class="web" href="https://www.fourcarpool.com/" target="_blank">
    Visit Website
  </a>

  <a class="ios" href="https://apps.apple.com/in/app/four-carpool/id6759831653" target="_blank">
    Download on App Store
  </a>

  <a class="android" href="https://play.google.com/store/apps/details?id=com.four.car.fourcar" target="_blank">
    Download on Play Store
  </a>

  <div class="tag">
    Built with FOUR ❤️
  </div>

</div>

</body>
</html>
